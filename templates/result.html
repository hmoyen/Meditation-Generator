<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Meditation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;

    margin:0;
    min-height:100vh;

    background:linear-gradient(
        140deg,
        #0F5C8E,
        #1E78A6,
        #5FB3C7
    );

    display:flex;
    align-items:center;
    justify-content:center;
}

/* card */

.meditation-card{

    width:100%;
    max-width:520px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    border:none;
}

/* title */

h1{
    font-weight:300;
    color:#0F5C8E;
}

.subtitle{
    color:#6b8793;
    font-size:15px;
}

/* breathing animation */

.breathing-circle{

    width:90px;
    height:90px;

    background:#7AD6E8;

    border-radius:50%;

    margin:25px auto;

    animation:breathe 6s infinite ease-in-out;
}

@keyframes breathe{

0%,100%{
    transform:scale(.8);
    opacity:.5;
}

50%{
    transform:scale(1.15);
    opacity:1;
}

}

/* audio player */

audio{
    margin-top:15px;
}

/* buttons */

.btn-soft{

    background:#1E78A6;
    border:none;

    border-radius:12px;

    padding:10px;

    transition:all .2s;
}

.btn-soft:hover{
    background:#155f83;
}

.btn-outline-soft{
    border-radius:12px;
}

.back-link{
    color:#1E78A6;
    text-decoration:none;
}

.back-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="meditation-card text-center shadow">

<h1 class="mb-2">
Your Meditation
</h1>

<p class="subtitle">
Take a slow breath and begin when you feel ready.
</p>

<div class="breathing-circle"></div>

<audio controls class="w-100">

<source src="{{ url_for('static', filename='audio/' + audio_file) }}" type="audio/mpeg">

Your browser does not support the audio element.

</audio>

<div class="d-grid gap-2 mt-4">

<a href="{{ url_for('static', filename='audio/' + audio_file) }}"
class="btn btn-soft"
download>

Download Audio (.mp3)

</a>

<a href="{{ url_for('static', filename='scripts/' + script_file) }}"
class="btn btn-outline-secondary btn-outline-soft"
download>

Download Script (.txt)

</a>

</div>

<div class="mt-4">

<a href="/" class="back-link">

← Generate another meditation

</a>

</div>

</div>

</body>
</html>
