<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFocus | Meditation Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { max-width: 500px; margin: auto; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card form-card shadow p-4">
        <h2 class="text-center mb-4">🧘 ZenFocus</h2>
        <p class="text-center text-muted">Customize your meditation session.</p>

        <form action="/generate" method="post" onsubmit="showLoading()">
            
            <div class="mb-3">
                <label class="form-label">Age Range</label>
                <select name="age" class="form-select">
                    <option>13-15</option>
                    <option>16-18</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Mood</label>
                <select name="mood" class="form-select">
                    <option>Anxious</option>
                    <option>Stressed</option>
                    <option>Tired</option>
                    <option>Okay</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Context</label>
                <select name="context" class="form-select">
                    <option>Exams</option>
                    <option>Project Work</option>
                    <option>Studying</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Style</label>
                <select name="style" class="form-select">
                    <option>Calm</option>
                    <option>Motivational</option>
                    <option>Concentration</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Duration (minutes)</label>
                <select name="length" class="form-select">
                    <option>5</option>
                    <option>10</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary w-100 btn-lg mt-3">Generate Meditation</button>
        </form>
    </div>
</div>

<script>
    function showLoading() {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = 'Generating...';
        btn.disabled = true;
    }
</script>

</body>
</html>
